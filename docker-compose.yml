version: '3.8'

services:
  frontend:
    image: frontend-image:latest  # Replace with actual frontend image
    build:
      context: ./frontend           # Adjust context as necessary
    ports:
      - "3000:3000"                 # Adjust port mappings as necessary
    depends_on:
      - backend

  backend:
    image: backend-image:latest    # Replace with actual backend image
    build:
      context: ./backend            # Adjust context as necessary
    ports:
      - "5000:5000"                 # Adjust port mappings as necessary
    depends_on:
      - database

  database:
    image: postgres:latest          # Example database image
    environment:
      POSTGRES_USER: user           # Replace with actual user
      POSTGRES_PASSWORD: password     # Replace with actual password
      POSTGRES_DB: dbname            # Replace with actual dbname
    ports:
      - "5432:5432"                  # Adjust port mappings as necessary
